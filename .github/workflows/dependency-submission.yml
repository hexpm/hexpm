name: Mix Dependency Submission

on:
  push:
    branches:
      - "main"
  # pull_request_target is needed to get write permission for posting PR
  # comments on fork PRs; no code from the PR is executed
  pull_request_target: {} # zizmor: ignore[dangerous-triggers]

permissions:
  contents: read

jobs:
  submit:
    name: Submit Dependencies
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: erlef/mix-dependency-submission@fa3e8f349d00a32bf14eec1c7577d6564abe08d2 # v1.3.1

  review:
    name: Review Dependencies
    if: ${{ github.event_name == 'pull_request_target' }}
    runs-on: ubuntu-24.04
    needs: submit
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          comment-summary-in-pr: always
